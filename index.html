<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kintos LLC</title>
    <meta
      name="description"
      content="Kintos LLC is an independent company focused on durable software, systems, and technical execution."
    >
    <meta property="og:title" content="Kintos LLC">
    <meta
      property="og:description"
      content="Durable software, systems, and technical execution."
    >
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kintosllc.com/">
    <meta name="theme-color" content="#141414">
    <style>
      :root {
        color-scheme: light;
        --ink: #141414;
        --muted: #62615d;
        --line: #d7d2c8;
        --paper: #f6f3ed;
        --white: #fffdfa;
        --moss: #596b57;
        --blue: #275e79;
        --rust: #a45d3f;
        --shadow: 0 24px 70px rgba(20, 20, 20, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--paper);
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        line-height: 1.5;
        background:
          radial-gradient(circle at 15% 18%, rgba(164, 93, 63, 0.16), transparent 27rem),
          radial-gradient(circle at 84% 22%, rgba(39, 94, 121, 0.15), transparent 28rem),
          linear-gradient(135deg, #fffdfa 0%, #f6f3ed 52%, #e9e1d2 100%);
      }

      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 2rem;
      }

      .shell {
        width: min(100%, 68rem);
        display: grid;
        grid-template-columns: minmax(0, 1.05fr) minmax(19rem, 0.75fr);
        gap: clamp(2rem, 6vw, 5rem);
        align-items: center;
      }

      .eyebrow {
        margin: 0 0 1rem;
        color: var(--moss);
        font-size: 0.78rem;
        font-weight: 760;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        max-width: 11ch;
        font-size: clamp(4.25rem, 11vw, 8.75rem);
        line-height: 0.9;
        letter-spacing: 0;
      }

      .lede {
        max-width: 39rem;
        margin: 1.55rem 0 0;
        color: var(--muted);
        font-size: clamp(1.1rem, 2.4vw, 1.55rem);
      }

      .contact {
        display: flex;
        flex-wrap: wrap;
        gap: 0.9rem;
        align-items: center;
        margin-top: 2.2rem;
      }

      .button,
      .text-link {
        min-height: 2.85rem;
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
        border-radius: 0.45rem;
        font-size: 0.96rem;
        font-weight: 720;
        text-decoration: none;
      }

      .button {
        padding: 0.78rem 1.1rem;
        color: var(--white);
        background: var(--ink);
        box-shadow: 0 10px 24px rgba(20, 20, 20, 0.17);
      }

      .button:focus-visible,
      .text-link:focus-visible {
        outline: 3px solid rgba(39, 94, 121, 0.35);
        outline-offset: 4px;
      }

      .text-link {
        padding: 0.72rem 0.25rem;
        color: var(--blue);
      }

      .mark {
        position: relative;
        min-height: 29rem;
        border: 1px solid rgba(20, 20, 20, 0.11);
        border-radius: 0.5rem;
        overflow: hidden;
        background: var(--white);
        box-shadow: var(--shadow);
      }

      .mark svg {
        width: 100%;
        height: 100%;
        min-height: 29rem;
        display: block;
      }

      .status {
        position: absolute;
        right: 1rem;
        bottom: 1rem;
        left: 1rem;
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        padding-top: 0.9rem;
        border-top: 1px solid rgba(20, 20, 20, 0.13);
        color: var(--muted);
        font-size: 0.82rem;
      }

      .status strong {
        color: var(--ink);
      }

      @media (max-width: 760px) {
        main {
          align-items: start;
          padding: 1.15rem;
        }

        .shell {
          grid-template-columns: 1fr;
          gap: 2rem;
          padding-top: 2rem;
        }

        h1 {
          font-size: clamp(3.8rem, 23vw, 6.6rem);
        }

        .mark {
          min-height: 20rem;
        }

        .mark svg {
          min-height: 20rem;
        }

        .status {
          font-size: 0.76rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="shell" aria-label="Kintos LLC">
        <div>
          <p class="eyebrow">Independent company</p>
          <h1>Kintos LLC</h1>
          <p class="lede">
            Durable software, systems, and technical execution. A small,
            focused company built for clear thinking and careful work.
          </p>
          <div class="contact" aria-label="Contact links">
            <a class="button" href="mailto:hello@kintosllc.com" aria-label="Email Kintos LLC">
              <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M4 6h16v12H4z" stroke="currentColor" stroke-width="2" />
                <path d="m4 7 8 6 8-6" stroke="currentColor" stroke-width="2" />
              </svg>
              hello@kintosllc.com
            </a>
            <a class="text-link" href="https://github.com/Xibalba1" aria-label="View GitHub profile">
              GitHub
            </a>
          </div>
        </div>

        <div class="mark" aria-hidden="true">
          <svg viewBox="0 0 560 640" role="img">
            <defs>
              <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0" stop-color="#fffdfa" />
                <stop offset="1" stop-color="#ece5d8" />
              </linearGradient>
              <linearGradient id="stroke" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0" stop-color="#275e79" />
                <stop offset="0.55" stop-color="#596b57" />
                <stop offset="1" stop-color="#a45d3f" />
              </linearGradient>
            </defs>
            <rect width="560" height="640" fill="url(#panel)" />
            <path d="M78 93h404v454H78z" fill="none" stroke="#d8d0c1" stroke-width="2" />
            <path
              d="M154 506V132h70v158l140-158h88L307 295l159 211h-91L257 344l-33 37v125h-70z"
              fill="url(#stroke)"
            />
            <path d="M138 532h284" stroke="#141414" stroke-width="5" />
            <path d="M138 552h176" stroke="#a45d3f" stroke-width="5" />
            <circle cx="435" cy="522" r="18" fill="#596b57" />
          </svg>
          <div class="status">
            <span><strong>kintosllc.com</strong></span>
            <span>Est. 2026</span>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
