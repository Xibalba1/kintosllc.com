<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kintos LLC</title>
    <meta name="description" content="Kintos LLC">
    <meta property="og:title" content="Kintos LLC">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kintosllc.com/">
    <meta name="theme-color" content="#000000">
    <style>
      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: #000;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        color: #fff;
        background: #000;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        padding: 2rem;
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(4.5rem, 16vw, 12rem);
        line-height: 0.9;
        letter-spacing: 0;
      }

      a {
        display: inline-block;
        margin-top: 1.5rem;
        color: #fff;
        font-size: clamp(1.25rem, 3vw, 2rem);
        text-decoration: underline;
        text-underline-offset: 0.18em;
      }

      a:focus-visible {
        outline: 3px solid #fff;
        outline-offset: 0.35rem;
      }
    </style>
  </head>
  <body>
    <main aria-label="Kintos LLC">
      <h1>Kintos LLC</h1>
      <a href="https://www.kwento.fun">Kwento</a>
    </main>
  </body>
</html>
